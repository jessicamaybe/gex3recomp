# RSPRecomp config for Gex 3's audio microcode (aspMain-style).
# Task observed at runtime: ucode vram 0x8007DB60 (rom 0x7E760), size 0x1000,
# data vram 0x80087680 (rom 0x88280). Indirect branch targets extracted from
# the command dispatch table at the start of the ucode data section.
text_offset = 0x7E760
text_size = 0x1000
# rspboot loads the task ucode immediately after itself at IMEM 0x1080 —
# with base 0x1000 every dispatch-table target was off by 0x80 (cmd 0 hit a
# DMA helper instead of its no-op, looping forever).
text_address = 0x04001080
rom_file_path = "gex3.z64"
output_file_path = "rsp/aspMain.cpp"
output_function_name = "aspMain"
extra_indirect_branch_targets = [
    0x1118, 0x11DC, 0x1214, 0x1254, 0x1294, 0x12D0, 0x12EC, 0x1328,
    0x138C, 0x140C, 0x144C, 0x1470, 0x170C, 0x187C, 0x1B38, 0x1E24,
]
